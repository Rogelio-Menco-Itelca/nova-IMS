sonar.projectKey=nova-ims
sonar.projectName=Nova-IMS
sonar.sourceEncoding=UTF-8

sonar.sources=backend,frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/.angular/**,**/sql/**,**/*.sql,backend/scripts/**,backend/views/**

sonar.tests=backend/test,frontend/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.js,**/*.spec.js
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Excepciones puntuales (consola en arranque, scripts CLI, logger, email modo consola, API key Maps)
