<div class="min-h-screen flex items-center justify-center bg-gray-900">
  <div class="bg-gray-800 rounded-xl shadow-2xl p-8 w-full max-w-md border border-gray-700">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <svg
          class="h-12 w-12 text-indigo-400"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-white">Cambiar contraseña</h2>
      <p class="text-gray-400 text-sm mt-2">
        Es su primer ingreso. Debe definir una nueva contraseña y luego volver a iniciar sesión.
      </p>
    </div>

    <!-- Error -->
    @if (error()) {
      <div
        class="mb-4 bg-red-900/50 border border-red-500/50 text-red-300 text-sm rounded-lg p-3 flex items-center gap-2"
      >
        <svg
          class="h-4 w-4 flex-shrink-0"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        {{ error() }}
      </div>
    }

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="changePassword()">
      <div class="space-y-4">
        <div>
          <label for="current-password" class="block text-sm font-medium text-gray-300 mb-1"
            >Contraseña actual</label
          >
          <input
            id="current-password"
            type="password"
            formControlName="currentPassword"
            placeholder="Ingresa tu contraseña temporal"
            class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent placeholder-gray-500"
          />
        </div>

        <div>
          <label for="new-password" class="block text-sm font-medium text-gray-300 mb-1"
            >Nueva contraseña</label
          >
          <input
            id="new-password"
            type="password"
            formControlName="newPassword"
            placeholder="Ingresa tu nueva contraseña"
            class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent placeholder-gray-500"
          />
          <p class="mt-2 text-xs text-gray-400">
            Use al menos 8 caracteres con mayúscula, minúscula, número y símbolo. Sin espacios.
          </p>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || isSubmitting()"
        class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-600 disabled:cursor-not-allowed text-white font-bold py-2.5 px-4 rounded-lg transition-colors duration-200"
      >
        {{ isSubmitting() ? 'Guardando...' : 'Cambiar contraseña e iniciar sesión' }}
      </button>
    </form>
  </div>
</div>
